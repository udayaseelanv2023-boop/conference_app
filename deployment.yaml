apiVersion: apps/v1
kind: Deployment
metadata:
  name: conference-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: conference-app
  template:
    metadata:
      labels:
        app: conference-app
    spec:
      containers:
      - name: conference-container
        image: conference-app:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: conference-service
spec:
  type: NodePort
  selector:
    app: conference-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30001